<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar"
         [class.closed]="!isSidebarOpen"
         [class.mobile-open]="isSidebarOpen">

    <!-- HEADER -->
    <div class="sidebar-header">

      <div class="logo">

        <svg width="22"
             height="22"
             fill="none"
             stroke="currentColor"
             stroke-width="2">

          <path d="M3 18h18l-2-10-4 3-3-6-3 6-4-3-2 10z"></path>

        </svg>

        <a *ngIf="isSidebarOpen" routerLink="/">
          نمایشگاه مایا خودرو
        </a>

      </div>

      <!-- DESKTOP TOGGLE -->
      <button class="sidebar-toggle-btn"
              (click)="toggleSidebar()">

        <svg width="22"
             height="22"
             fill="none"
             stroke="currentColor"
             stroke-width="2">

          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>

        </svg>

      </button>

    </div>

    <!-- NAVIGATION -->
    <div class="sidebar-nav">

      <!-- USERS -->
      <div class="nav-item"
           [class.active]="activeSection==='users'"
           (click)="goToSection('users')">

        <svg width="20"
             height="20"
             stroke="currentColor"
             fill="none"
             stroke-width="2">

          <circle cx="12" cy="7" r="4"></circle>
          <path d="M5.5 21a6.5 6.5 0 0 1 13 0"></path>

        </svg>

        <span *ngIf="isSidebarOpen">
          مدیریت کاربران
        </span>

      </div>

      <!-- CARS -->
      <div class="nav-item"
           [class.active]="activeSection==='cars'"
           (click)="goToSection('cars')">

        <svg width="20"
             height="20"
             stroke="currentColor"
             fill="none"
             stroke-width="2">

          <path d="M3 13l2-5h14l2 5"></path>
          <circle cx="7.5" cy="17.5" r="2.5"></circle>
          <circle cx="16.5" cy="17.5" r="2.5"></circle>

        </svg>

        <span *ngIf="isSidebarOpen">
          مدیریت ماشین‌ها
        </span>

      </div>

      <!-- CATEGORY -->
      <div class="nav-item"
           [class.active]="activeSection==='category'"
           (click)="goToSection('category')">

        <svg width="20"
             height="20"
             stroke="currentColor"
             fill="none"
             stroke-width="2">

          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>

        </svg>

        <span *ngIf="isSidebarOpen">
          مدیریت دسته‌بندی
        </span>

      </div>

      <!-- COMPANY -->
      <div class="nav-item"
           [class.active]="activeSection==='company'"
           (click)="goToSection('company')">

        <svg width="20"
             height="20"
             stroke="currentColor"
             fill="none"
             stroke-width="2">

          <path d="M3 21V7l9-4 9 4v14H3z"></path>
          <path d="M9 21v-6h6v6"></path>

        </svg>

        <span *ngIf="isSidebarOpen">
          مدیریت شرکت‌ها
        </span>

      </div>

      <!-- MODEL -->
      <div class="nav-item"
           [class.active]="activeSection==='model'"
           (click)="goToSection('model')">

        <svg width="20"
             height="20"
             stroke="currentColor"
             fill="none"
             stroke-width="2">

          <circle cx="12" cy="12" r="4"></circle>
          <path d="M2 12h20"></path>
          <path d="M12 2v20"></path>

        </svg>

        <span *ngIf="isSidebarOpen">
          مدیریت مدل‌ها
        </span>

      </div>

      <!-- TIP -->
      <div class="nav-item"
           [class.active]="activeSection==='tip'"
           (click)="goToSection('tip')">

        <svg width="20"
             height="20"
             stroke="currentColor"
             fill="none"
             stroke-width="2">

          <path d="M3 7h18"></path>
          <path d="M3 12h18"></path>
          <path d="M3 17h18"></path>

        </svg>

        <span *ngIf="isSidebarOpen">
          مدیریت تیپ‌ها
        </span>

      </div>

      <!-- ORDER -->
      <div class="nav-item"
           [class.active]="activeSection==='order'"
           (click)="goToSection('order')">

        <svg width="20"
             height="20"
             stroke="currentColor"
             fill="none"
             stroke-width="2">

          <rect x="4" y="4" width="16" height="16"></rect>
          <path d="M8 8h8"></path>
          <path d="M8 12h6"></path>

        </svg>

        <span *ngIf="isSidebarOpen">
          مدیریت فاکتورها
        </span>

      </div>

    </div>

  </aside>

  <!-- OVERLAY -->
  <div class="sidebar-overlay"
       *ngIf="isSidebarOpen"
       (click)="toggleSidebar()">
  </div>

  <!-- MAIN -->
  <div class="main-content">

    <!-- HEADER -->
    <header class="top-header">

      <!-- MOBILE BUTTON -->
      <button class="mobile-menu-btn"
              (click)="toggleSidebar()">

        <svg width="22"
             height="22"
             fill="none"
             stroke="currentColor"
             stroke-width="2">

          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>

        </svg>

      </button>

      <!-- TITLE -->
      <h2 class="page-title">
        {{ pageTitle }}
      </h2>

      <!-- LOGOUT -->
      <div class="logout-box"
           (click)="logout()">

        <svg width="20"
             height="20"
             stroke="currentColor"
             fill="none"
             stroke-width="2">

          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>

        </svg>

        <span>
          خروج از سامانه
        </span>

      </div>

    </header>

    <!-- CONTENT -->
    <div class="content-pane">

      <router-outlet></router-outlet>

    </div>

  </div>

</div>
