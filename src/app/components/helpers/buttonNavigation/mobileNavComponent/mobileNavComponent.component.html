<div class="mobile-nav-container">
  <!-- پنل کشویی پروفایل (زمانی که کاربر لاگین است) -->
  <div class="profile-drawer" [class.active]="showProfileMenu && isLogin">
    <div class="drawer-header">
      <div class="user-info">
        <span class="welcome-text">خوش آمدید</span>
        <span class="user-name">{{ fullName }}</span>
      </div>
      <button class="close-btn" (click)="showProfileMenu = false">×</button>
    </div>

    <div class="drawer-body">
      <!-- دکمه شیک طلایی برای ورود به داشبورد -->
      <a [routerLink]="dashboardUrl" (click)="showProfileMenu = false" class="dashboard-gold-btn">
        ورود به داشبورد
      </a>

      <button (click)="logout()" class="logout-link-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        خروج از حساب کاربری
      </button>
    </div>
  </div>

  <!-- بار اصلی پایین صفحه -->
  <nav class="bottom-bar">
    <a class="nav-item" (click)="goToInstallMent()">
      <svg viewBox="0 0 24 24" class="gold-icon"><path d="M19,3H5C3.89,3 3,3.9 3,5V19C3,20.1 3.89,21 5,21H19C20.1,21 21,20.1 21,19V5C21,3.9 20.1,3 19,3M19,19H5V5H19V19M11,7H13V9H11V7M11,11H13V13H11V11M11,15H13V17H11V15M7,7H9V9H7V7M7,11H9V13H7V11M7,15H9V17H7V15M15,7H17V17H15V7Z"/></svg>
      <span>محاسبه اقساط</span>
    </a>

    <a routerLink="/carList" routerLinkActive="active" class="nav-item">
      <svg viewBox="0 0 24 24" class="gold-icon"><path d="M18.92,11.01C18.72,10.42 18.16,10 17.5,10H6.5C5.84,10 5.28,10.42 5.08,11.01L3,17V24H5V22H19V24H21V17L18.92,11.01M6.5,12H17.5L18.53,15H5.47L6.5,12M5,17H19V20H5V17M6.5,18.5A1.25,1.25 0 1,0 7.75,19.75A1.25,1.25 0 0,0 6.5,18.5M17.5,18.5A1.25,1.25 0 1,0 18.75,19.75A1.25,1.25 0 0,0 17.5,18.5Z"/></svg>
      <span>خودرو ها</span>
    </a>

    <a href="https://web.bale.ai/chat?uid=1835365862" class="nav-item">
      <svg viewBox="0 0 24 24" class="gold-icon"><path d="M12,1C7,1 3,5 3,10V17A3,3 0 0,0 6,20H9V12H5V10A7,7 0 0,1 12,3A7,7 0 0,1 19,10V12H15V20H18A3,3 0 0,0 21,17V10C21,5 17,1 12,1Z"/></svg>
      <span>پشتیبانی</span>
    </a>

    <!-- بخش ورود یا پروفایل -->
    <div (click)="toggleProfile()" class="nav-item" [class.active]="showProfileMenu">
      <svg viewBox="0 0 24 24" class="gold-icon"><path d="M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14C16.42,14 20,15.79 20,18V20H4V18C4,15.79 7.58,14 12,14Z"/></svg>
      <span>{{ isLogin ? 'پنل کاربری' : 'ورود' }}</span>
    </div>
  </nav>
</div>
