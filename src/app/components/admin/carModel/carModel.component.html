<div class="table-container">

  <div class="table-header">

    <h2>
      مدیریت مدل ها
    </h2>

    <button
      class="add-btn"
      (click)="openCreate()">

      افزودن

    </button>

  </div>

  <div class="table-wrapper">

  <table class="custom-table">

    <thead>

      <tr>
        <th>نام</th>
        <th>عملیات</th>
      </tr>

    </thead>

    <tbody>

      <tr *ngFor="let model of carModels()">

        <td>
          {{ model.name }}
        </td>

        <td class="actions">

          <button
            class="edit-btn"
            type="button"
            (click)="openEdit(model)">

            آپدیت

          </button>

          <button
            class="delete-btn"
            type="button"
            (click)="openDelete(model)">

            حذف

          </button>

        </td>

      </tr>

    </tbody>

  </table>

  </div>

</div>

<!-- CREATE MODAL -->

<div
  class="modal-backdrop"
  *ngIf="activeModal() === 'create'">

  <div class="modal-container sm">

    <div class="modal-header">

      <span>
        افزودن مدل جدید
      </span>

      <button
        class="close-btn"
        type="button"
        (click)="closeModal()">

        ×

      </button>

    </div>

    <div class="modal-body">

      <div class="form-group">

        <label>
          نام مدل
        </label>

        <input
          type="text"
          [(ngModel)]="createDto().name">

      </div>

      <button
        class="save-btn"
        type="button"
        (click)="create()">

        ذخیره

      </button>

    </div>

  </div>

</div>

<!-- EDIT MODAL -->

<div
  class="modal-backdrop"
  *ngIf="activeModal() === 'edit'">

  <div class="modal-container sm">

    <div class="modal-header">

      <span>
        ویرایش مدل
      </span>

      <button
        class="close-btn"
        type="button"
        (click)="closeModal()">

        ×

      </button>

    </div>

    <div class="modal-body">

      <div class="form-group">

        <label>
          نام مدل
        </label>

        <input
          type="text"
          [(ngModel)]="editDto().name">

      </div>

      <button
        class="save-btn"
        type="button"
        (click)="update()">

        ذخیره تغییرات

      </button>

    </div>

  </div>

</div>

<!-- DELETE MODAL -->

<div
  class="modal-backdrop"
  *ngIf="activeModal() === 'delete'">

  <div class="modal-container sm">

    <div class="modal-header">

      <span>
        حذف مدل
      </span>

      <button
        class="close-btn"
        type="button"
        (click)="closeModal()">

        ×

      </button>

    </div>

    <div class="modal-body">

      <p>
        آیا از حذف این مدل مطمئن هستید؟
      </p>

      <div class="delete-action-modal">

        <button
          class="yes-btn"
          type="button"
          (click)="deleteCarModel()">

          بله

        </button>

        <button
          class="no-btn"
          type="button"
          (click)="closeModal()">

          خیر

        </button>

      </div>

    </div>

  </div>

</div>
