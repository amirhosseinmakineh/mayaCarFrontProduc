<div class="table-container">

  <div class="table-header">

    <h2>
      مدیریت شرکت ها
    </h2>

    <button
      class="add-btn"
      type="button"
      (click)="openCreate()">

      افزودن

    </button>

  </div>

  <table class="custom-table">

    <thead>

      <tr>

        <th>نام</th>

        <th>عملیات</th>

      </tr>

    </thead>

    <tbody>

      <tr
        *ngFor="let company of companies(); trackBy: trackByCompany">

        <td>

          {{ company.name }}

        </td>

        <td class="actions">

          <button
            class="edit-btn"
            type="button"
            (click)="openEdit(company)">

            آپدیت

          </button>

          <button
            class="delete-btn"
            type="button"
            (click)="openDelete(company)">

            حذف

          </button>

        </td>

      </tr>

    </tbody>

  </table>

</div>

<!-- CREATE MODAL -->

<div
  class="modal-backdrop"
  *ngIf="activeModal() === 'create'">

  <div class="modal-container sm">

    <div class="modal-header">

      <span>
        افزودن شرکت
      </span>

      <button
        class="close-btn"
        type="button"
        (click)="closeModal()">

        ×

      </button>

    </div>

    <div class="modal-body">

      <div class="form-group">

        <label>
          نام شرکت
        </label>

        <input
          type="text"
          [(ngModel)]="createDto().name">

      </div>

      <button
        type="button"
        class="save-btn"
        (click)="create()">

        ذخیره

      </button>

    </div>

  </div>

</div>

<!-- EDIT MODAL -->

<div
  class="modal-backdrop"
  *ngIf="activeModal() === 'edit'">

  <div class="modal-container sm">

    <div class="modal-header">

      <span>
        ویرایش شرکت
      </span>

      <button
        class="close-btn"
        type="button"
        (click)="closeModal()">

        ×

      </button>

    </div>

    <div class="modal-body">

      <div class="form-group">

        <label>
          نام شرکت
        </label>

        <input
          type="text"
          [(ngModel)]="editDto().name">

      </div>

      <button
        type="button"
        class="save-btn"
        (click)="update()">

        ذخیره تغییرات

      </button>

    </div>

  </div>

</div>

<!-- DELETE MODAL -->

<div
  class="modal-backdrop"
  *ngIf="activeModal() === 'delete'">

  <div class="modal-container sm">

    <div class="modal-header">

      <span>
        حذف شرکت
      </span>

      <button
        class="close-btn"
        type="button"
        (click)="closeModal()">

        ×

      </button>

    </div>

    <div class="modal-body">

      <p>

        آیا از حذف این شرکت مطمئن هستید؟

      </p>

      <div class="delete-action-modal">

        <button
          class="yes-btn"
          type="button"
          (click)="deleteCompany()">

          بله

        </button>

        <button
          class="no-btn"
          type="button"
          (click)="closeModal()">

          خیر

        </button>

      </div>

    </div>

  </div>

</div>
